apiVersion: v1
kind: ConfigMap
metadata:
  name: teknoloji-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tech-radar.labels" . | nindent 4 }}
data:
  DEBUG: {{ .Values.config.django.debug | quote }}
  ALLOWED_HOSTS: {{ .Values.config.django.allowedHosts | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.django.corsAllowedOrigins | quote }}
  DATABASE_URL: {{ .Values.config.database.url | quote }}
  DB_NAME: {{ .Values.config.database.name | quote }}
  DB_HOST: {{ .Values.config.database.host | quote }}
  DB_PORT: {{ .Values.config.database.port | quote }}
  REDIS_URL: {{ .Values.config.redis.url | quote }}
  CELERY_BROKER_URL: {{ .Values.config.redis.celeryBrokerUrl | quote }}
