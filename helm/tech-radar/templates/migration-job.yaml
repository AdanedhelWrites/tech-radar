apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.migration.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tech-radar.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.migration.name }}
    app.kubernetes.io/component: {{ .Values.migration.component }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.migration.name }}
    spec:
      restartPolicy: {{ .Values.migration.restartPolicy }}
      containers:
        - name: migrate
          image: {{ include "tech-radar.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "PostgreSQL bekleniyor..."
              while ! nc -z "$DB_HOST" "${DB_PORT:-5432}" 2>/dev/null; do
                sleep 2
              done
              echo "Migration calistiriliyor..."
              python manage.py migrate --noinput
              echo "Static dosyalar toplaniyor..."
              python manage.py collectstatic --noinput
              echo "Migration tamamlandi!"
          envFrom:
            - configMapRef:
                name: teknoloji-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: teknoloji-secret
                  key: SECRET_KEY
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: teknoloji-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teknoloji-secret
                  key: DB_PASSWORD
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
