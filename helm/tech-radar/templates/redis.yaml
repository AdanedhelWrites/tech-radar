{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tech-radar.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.redis.name }}
    app.kubernetes.io/component: {{ .Values.redis.component }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.redis.name }}
        app.kubernetes.io/component: {{ .Values.redis.component }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
          ports:
            - containerPort: {{ .Values.redis.port }}
          command:
            - redis-server
            - --appendonly
            - {{ .Values.redis.appendonly | ternary "yes" "no" }}
            - --maxmemory
            - {{ .Values.redis.maxmemory }}
            - --maxmemory-policy
            - {{ .Values.redis.maxmemoryPolicy }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: {{ .Values.redis.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.probes.readiness.periodSeconds }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: {{ .Values.redis.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.probes.liveness.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tech-radar.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.redis.name }}
    app.kubernetes.io/component: {{ .Values.redis.component }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  selector:
    app.kubernetes.io/name: {{ .Values.redis.name }}
{{- end }}
